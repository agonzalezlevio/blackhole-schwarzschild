<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Agujero negro · Lente gravitacional</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <canvas id="c"></canvas>

    <div class="hud" id="title">
      <h1 data-i18n="title.heading">Agujero negro</h1>
      <p data-i18n="title.subtitle">Lente gravitacional · métrica de Schwarzschild</p>
    </div>
    <div class="hud" id="hint" data-i18n="hint">
      Arrastra para orbitar · rueda o pellizco para acercar
    </div>

    <div class="hud" id="panel">
      <div id="panelHead">
        <b data-i18n="panel.head">Controles</b>
        <button id="panelToggle" aria-label="Plegar panel">–</button>
      </div>
      <div id="panelBody">
        <label class="ctrl">
          <div class="row"><span data-i18n="panel.quality">Calidad</span></div>
          <select id="quality">
            <option value="low" data-i18n="quality.low">Baja</option>
            <option value="med" selected data-i18n="quality.med">Media</option>
            <option value="high" data-i18n="quality.high">Alta</option>
          </select>
        </label>
        <label class="ctrl">
          <div class="row">
            <span data-i18n="panel.bloom">Bloom</span><span class="val" id="bloomV"></span>
          </div>
          <input type="range" id="bloom" min="0" max="2.5" step="0.05" value="1.15" />
        </label>
        <label class="ctrl">
          <div class="row">
            <span data-i18n="panel.exposure">Exposición</span><span class="val" id="expoV"></span>
          </div>
          <input type="range" id="expo" min="0.4" max="2" step="0.05" value="1" />
        </label>
        <label class="ctrl">
          <div class="row">
            <span data-i18n="panel.diskBrightness">Brillo del disco</span
            ><span class="val" id="diskV"></span>
          </div>
          <input type="range" id="disk" min="0.2" max="2" step="0.05" value="1" />
        </label>
        <label class="ctrl">
          <div class="row">
            <span data-i18n="panel.doppler">Efecto Doppler</span
            ><span class="val" id="doppV"></span>
          </div>
          <input type="range" id="dopp" min="0" max="1" step="0.05" value="0.55" />
        </label>
        <label class="chk">
          <input type="checkbox" id="autorb" checked />
          <span data-i18n="panel.autoOrbit">Órbita automática</span>
        </label>
        <div class="btnrow">
          <button id="pauseBtn">Pausar disco</button>
          <button id="resetBtn" data-i18n="panel.resetView">Reiniciar vista</button>
        </div>
        <label class="ctrl">
          <div class="row"><span data-i18n="panel.language">Idioma</span></div>
          <select id="lang">
            <option value="es">Español</option>
            <option value="en">English</option>
          </select>
        </label>
        <div id="fps"></div>
      </div>
    </div>

    <div id="fallback">
      <div id="fallbackText" data-i18n="fallback">
        Este simulador necesita WebGL2. Prueba con una versión reciente de Chrome, Firefox, Edge o
        Safari.
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
